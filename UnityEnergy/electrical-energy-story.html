<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="icon" href="favicon.ico">
    <title>Energy Field Story - Under Construction</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: linear-gradient(135deg, rgba(49, 65, 0, 1) 0%, rgba(90, 122, 42, 1) 100%);
        }
        .construction-card {
            width: min(680px, 100%);
            background: rgba(255, 255, 255, 0.97);
            border: 2px solid rgba(151, 189, 55, 1);
            border-radius: 16px;
            padding: 30px 26px;
            text-align: center;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.22);
        }
        .construction-card h1 {
            color: rgba(61, 84, 17, 1);
            font-size: clamp(1.5rem, 4vw, 2.1rem);
            margin-bottom: 10px;
        }
        .construction-card p {
            color: rgba(79, 89, 56, 1);
            font-size: 1.02rem;
            margin-bottom: 16px;
        }
        .construction-note {
            color: rgba(149, 94, 12, 1);
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        .home-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 18px;
            border-radius: 999px;
            border: 2px solid rgba(151, 189, 55, 1);
            background: rgba(76, 101, 27, 0.95);
            color: rgba(244, 250, 216, 1);
            text-decoration: none;
            font-weight: 700;
        }
        .home-link:hover {
            background: rgba(94, 123, 35, 1);
        }
    </style>
</head>
<body>
    <main class="construction-card">
        <h1>Under Construction</h1>
        <p>The Energy Field Story is still in development in eWebmaster and is not ready for public viewing yet.</p>
        <div class="construction-note">This page is temporarily unavailable</div>
        <a class="home-link" href="index.html">← Return to Unity Home</a>
    </main>
</body>
</html>
